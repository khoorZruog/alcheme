substitutions:
  _REGION: asia-northeast1
  _AR_REPO: alcheme
  _WEB_SERVICE: alcheme-web
  _AGENT_SERVICE: alcheme-agent
  _TAG: latest
  _GCS_PREVIEW_BUCKET: alcheme-previews

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/RAKUTEN_APP_ID/versions/latest
      env: RAKUTEN_APP_ID
    - versionName: projects/$PROJECT_ID/secrets/RAKUTEN_ACCESS_KEY/versions/latest
      env: RAKUTEN_ACCESS_KEY
    - versionName: projects/$PROJECT_ID/secrets/GOOGLE_WEATHER_API_KEY/versions/latest
      env: GOOGLE_WEATHER_API_KEY
    - versionName: projects/$PROJECT_ID/secrets/GOOGLE_CALENDAR_CLIENT_ID/versions/latest
      env: GOOGLE_CALENDAR_CLIENT_ID
    - versionName: projects/$PROJECT_ID/secrets/GOOGLE_CALENDAR_CLIENT_SECRET/versions/latest
      env: GOOGLE_CALENDAR_CLIENT_SECRET
    - versionName: projects/$PROJECT_ID/secrets/FIREBASE_API_KEY/versions/latest
      env: FIREBASE_API_KEY
    - versionName: projects/$PROJECT_ID/secrets/FIREBASE_AUTH_DOMAIN/versions/latest
      env: FIREBASE_AUTH_DOMAIN
    - versionName: projects/$PROJECT_ID/secrets/FIREBASE_STORAGE_BUCKET/versions/latest
      env: FIREBASE_STORAGE_BUCKET
    - versionName: projects/$PROJECT_ID/secrets/FIREBASE_MESSAGING_SENDER_ID/versions/latest
      env: FIREBASE_MESSAGING_SENDER_ID
    - versionName: projects/$PROJECT_ID/secrets/FIREBASE_APP_ID/versions/latest
      env: FIREBASE_APP_ID

steps:
  # ── Step 1: Build agent image ──
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/agent:${_TAG}"
      - "./agent"

  # ── Step 2: Push agent image ──
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/agent:${_TAG}"

  # ── Step 3: Deploy agent to Cloud Run ──
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: bash
    args:
      - "-c"
      - |
        gcloud run deploy ${_AGENT_SERVICE} \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/agent:${_TAG} \
          --region=${_REGION} \
          --platform=managed \
          --allow-unauthenticated \
          --port=8080 \
          --memory=1Gi \
          --max-instances=3 \
          --set-env-vars="GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_GENAI_USE_VERTEXAI=TRUE,GOOGLE_CLOUD_LOCATION=${_REGION},GCS_PREVIEW_BUCKET=${_GCS_PREVIEW_BUCKET},RAKUTEN_APP_ID=$$RAKUTEN_APP_ID,RAKUTEN_ACCESS_KEY=$$RAKUTEN_ACCESS_KEY,GOOGLE_WEATHER_API_KEY=$$GOOGLE_WEATHER_API_KEY,GOOGLE_CALENDAR_CLIENT_ID=$$GOOGLE_CALENDAR_CLIENT_ID,GOOGLE_CALENDAR_CLIENT_SECRET=$$GOOGLE_CALENDAR_CLIENT_SECRET"
    secretEnv:
      - RAKUTEN_APP_ID
      - RAKUTEN_ACCESS_KEY
      - GOOGLE_WEATHER_API_KEY
      - GOOGLE_CALENDAR_CLIENT_ID
      - GOOGLE_CALENDAR_CLIENT_SECRET

  # ── Step 4: Get agent URL ──
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: bash
    args:
      - "-c"
      - |
        gcloud run services describe ${_AGENT_SERVICE} \
          --region=${_REGION} \
          --format='value(status.url)' > /workspace/agent_url.txt

  # ── Step 5: Build web image ──
  - name: "gcr.io/cloud-builders/docker"
    entrypoint: bash
    args:
      - "-c"
      - |
        docker build \
          -t ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/web:${_TAG} \
          --build-arg NEXT_PUBLIC_FIREBASE_API_KEY=$$FIREBASE_API_KEY \
          --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=$$FIREBASE_AUTH_DOMAIN \
          --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID=$PROJECT_ID \
          --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=$$FIREBASE_STORAGE_BUCKET \
          --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=$$FIREBASE_MESSAGING_SENDER_ID \
          --build-arg NEXT_PUBLIC_FIREBASE_APP_ID=$$FIREBASE_APP_ID \
          --build-arg NEXT_PUBLIC_APP_URL=https://${_WEB_SERVICE}-${_REGION}-run.app \
          .
    secretEnv:
      - FIREBASE_API_KEY
      - FIREBASE_AUTH_DOMAIN
      - FIREBASE_STORAGE_BUCKET
      - FIREBASE_MESSAGING_SENDER_ID
      - FIREBASE_APP_ID

  # ── Step 6: Push web image ──
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/web:${_TAG}"

  # ── Step 7: Deploy web to Cloud Run ──
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: bash
    args:
      - "-c"
      - |
        AGENT_URL=$$(cat /workspace/agent_url.txt)
        gcloud run deploy ${_WEB_SERVICE} \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/web:${_TAG} \
          --region=${_REGION} \
          --platform=managed \
          --allow-unauthenticated \
          --port=3000 \
          --memory=512Mi \
          --max-instances=5 \
          --set-env-vars="NODE_ENV=production,ADK_AGENT_URL=$$AGENT_URL,FIREBASE_PROJECT_ID=$PROJECT_ID,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,RAKUTEN_APP_ID=$$RAKUTEN_APP_ID,RAKUTEN_ACCESS_KEY=$$RAKUTEN_ACCESS_KEY,GOOGLE_WEATHER_API_KEY=$$GOOGLE_WEATHER_API_KEY,GOOGLE_CALENDAR_CLIENT_ID=$$GOOGLE_CALENDAR_CLIENT_ID,GOOGLE_CALENDAR_CLIENT_SECRET=$$GOOGLE_CALENDAR_CLIENT_SECRET,GOOGLE_CALENDAR_REDIRECT_URI=https://${_WEB_SERVICE}-${_REGION}-run.app/api/auth/google-calendar/callback"
    secretEnv:
      - RAKUTEN_APP_ID
      - RAKUTEN_ACCESS_KEY
      - GOOGLE_WEATHER_API_KEY
      - GOOGLE_CALENDAR_CLIENT_ID
      - GOOGLE_CALENDAR_CLIENT_SECRET

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/agent:${_TAG}"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/web:${_TAG}"

options:
  logging: CLOUD_LOGGING_ONLY
